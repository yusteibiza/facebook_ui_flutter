name: facebook_ui
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/yo.jpg
    - assets/images/messenger.png

fonts:
  - family: Google Sans Medium
    fonts:
      - asset: assets/fonts/GoogleSans-Medium.ttf
        style: normal
        weight: 500

